name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site_url: ${{ steps.vars.outputs.site_url }}
      base_path: ${{ steps.vars.outputs.base_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute site variables
        id: vars
        env:
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "site_url=https://$CUSTOM_DOMAIN" >> "$GITHUB_OUTPUT"
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "site_url=https://$OWNER.github.io/$REPO" >> "$GITHUB_OUTPUT"
            echo "base_path=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          SITE_URL: ${{ steps.vars.outputs.site_url }}
          VITE_SITE_URL: ${{ steps.vars.outputs.site_url }}
          VITE_API_BASE: ${{ secrets.PROD_API_BASE }}
        run: npm run build -- --base="${{ steps.vars.outputs.base_path }}"

      - name: SPA fallback for Pages
        run: cp dist/index.html dist/404.html

      - name: Optional CNAME
        if: ${{ secrets.CUSTOM_DOMAIN != '' }}
        run: echo "${{ secrets.CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
